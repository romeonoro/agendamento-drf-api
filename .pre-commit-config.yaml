repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace  # Remove espaços inúteis no fim das linhas
      - id: end-of-file-fixer    # Garante que arquivos terminem com uma linha vazia
      - id: check-yaml           # Valida sintaxe de arquivos YAML
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 9.0.0a3
    hooks:
      - id: isort

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
